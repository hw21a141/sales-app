<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <meta name="theme-color" content="#007AFF">

    <title>スタッフ売上管理</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ヘッダー -->
    <header class="header">
        <h1>スタッフ売上管理</h1>
    </header>

    <!-- メイン -->
    <main class="content">

        <!-- ===================================== -->
        <!-- 売上入力 -->
        <!-- ===================================== -->
        <section id="page-input" class="page active-page">

            <div class="card">

                <h2>売上登録</h2>

                <label for="staffName">
                    スタッフ名
                </label>

                <input
                    type="text"
                    id="staffName"
                    placeholder="スタッフ名">

                <label for="salesAmount">
                    売上金額
                </label>

                <input
                    type="number"
                    id="salesAmount"
                    placeholder="売上金額">

                <label for="saleDate">
                    登録日
                </label>

                <input
                    type="date"
                    id="saleDate">

                <button
                    class="primary-btn"
                    onclick="addSale()">

                    売上登録

                </button>

            </div>

            <div class="card">

                <h2>登録履歴</h2>

                <div id="historyList">
                </div>

            </div>

            <div class="card">

                <button
                    class="danger-btn"
                    onclick="resetAllData()">

                    全データ削除

                </button>

            </div>

        </section>

        <!-- ===================================== -->
        <!-- 日別ランキング -->
        <!-- ===================================== -->
        <section id="page-daily" class="page">

            <div class="card">

                <h2>日別ランキング</h2>

                <label for="dailyDateFilter">
                    対象日
                </label>

                <input
                    type="date"
                    id="dailyDateFilter"
                    onchange="renderDailyRanking()">

                <table>

                    <thead>
                        <tr>
                            <th>順位</th>
                            <th>スタッフ</th>
                            <th>売上</th>
                        </tr>
                    </thead>

                    <tbody id="dailyRankingBody">
                    </tbody>

                </table>

            </div>

        </section>

        <!-- ===================================== -->
        <!-- 月別ランキング -->
        <!-- ===================================== -->
        <section id="page-monthly" class="page">

            <div class="card">

                <h2>月別ランキング</h2>

                <label for="monthlyFilter">
                    対象月
                </label>

                <input
                    type="month"
                    id="monthlyFilter"
                    onchange="renderMonthlyRanking()">

                <table>

                    <thead>
                        <tr>
                            <th>順位</th>
                            <th>スタッフ</th>
                            <th>売上</th>
                        </tr>
                    </thead>

                    <tbody id="monthlyRankingBody">
                    </tbody>

                </table>

            </div>

        </section>

        <!-- ===================================== -->
        <!-- グラフ -->
        <!-- ===================================== -->
        <section id="page-graph" class="page">

            <!-- 日別グラフ -->
            <div class="card">

                <h2>日別売上構成比</h2>

                <input
                    type="date"
                    id="dailyGraphDate"
                    onchange="renderDailyGraph()">

                <div class="chart-wrapper">

                    <svg
                        id="dailyPieChart"
                        viewBox="0 0 300 300">
                    </svg>

                </div>

                <div id="dailyLegend">
                </div>

            </div>

            <!-- 月別グラフ -->
            <div class="card">

                <h2>月別売上構成比</h2>

                <input
                    type="month"
                    id="monthlyGraphDate"
                    onchange="renderMonthlyGraph()">

                <div class="chart-wrapper">

                    <svg
                        id="monthlyPieChart"
                        viewBox="0 0 300 300">
                    </svg>

                </div>

                <div id="monthlyLegend">
                </div>

            </div>

        </section>

    </main>

    <!-- フッターナビ -->
    <footer class="footer">

        <button
            class="tab active-tab"
            id="tab-input"
            onclick="showPage('input')">

            <span>📝</span>
            <small>入力</small>

        </button>

        <button
            class="tab"
            id="tab-daily"
            onclick="showPage('daily')">

            <span>🏆</span>
            <small>日別</small>

        </button>

        <button
            class="tab"
            id="tab-monthly"
            onclick="showPage('monthly')">

            <span>📅</span>
            <small>月別</small>

        </button>

        <button
            class="tab"
            id="tab-graph"
            onclick="showPage('graph')">

            <span>📊</span>
            <small>グラフ</small>

        </button>

    </footer>

    <!-- JavaScript -->
    <script src="app.js"></script>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>

</body>
</html>
